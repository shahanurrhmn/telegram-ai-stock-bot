name: AI Stock Bot

on:
  schedule:
    - cron: '45 3 * * 1-5'   # 9:15 AM IST (Mon‑Fri)
    - cron: '30 5 * * 1-5'   # 11:00 AM IST
    - cron: '30 9 * * 1-5'   # 3:00 PM IST (market close)
    - cron: '30 13 * * 1-5'  # 7:30 PM IST (US market)
  workflow_dispatch:          # allows manual run

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Commit cache changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cache.json
          git diff --staged --quiet || git commit -m "update cache"
          git push
